# ==================== DÉCORATIONS ====================
# Ajustement de l'apparence des fenêtres

# Arrondis des fenêtres (mets 0 pour des angles droits)
decoration {
    rounding = 5  # Réduit de 10 à 5

    # Ombres
    shadow {
        enabled = true
        range = 10  # Réduit de 20 à 10
        render_power = 2  # Réduit de 3 à 2
        color = rgba(1a1a1a99)  # Plus transparent
    }

    # Flou (optionnel, commente si trop gourmand)
    blur {
        enabled = false  # Désactive le flou pour plus de performance
        # enabled = true
        # size = 5  # Réduit
        # passes = 2  # Réduit
    }
}

# Version ultra-compacte
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
}

decoration {
    rounding = 3
    shadow {
        enabled = false  # Pas d'ombre
    }
}

# Bordures plus discrètes
general {
    col.active_border = rgba(cba6f7ff)  # Mauve uni, moins de dégradé
    col.inactive_border = rgba(313244ff)  # Gris foncé
}
