# Hyprlock - Écran de verrouillage Catppuccin

general {
    hide_cursor = true
    grace = 5
    no_fade_in = false
    no_fade_out = false
}

monitor =
    path = ~/Pictures/wallpapers/current.jpg  # À adapter
    blur_passes = 3
    blur_size = 8
    brightness = 0.5

}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(cba6f7ee)
    inner_color = rgba(1e1e2eaa)
    font_color = rgba(cdd6f4ee)
    fade_on_empty = false
    placeholder_text = <i>Mot de passe...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ee)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = Bienvenue $USER
    color = rgba(cdd6f4ee)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
