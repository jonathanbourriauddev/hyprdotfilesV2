# Hyprlock - Configuration finale
# Thème: Catppuccin Mocha avec fond d'écran

general {
    hide_cursor = true
    grace = 5
    no_fade_in = false
    no_fade_out = false
}

# Fond d'écran
background {
    path = /home/joe/Pictures/wallpapers/current.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.5
}

# Horloge (grande, centrée)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ee)
    font_size = 96
    font_family = JetBrains Mono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:3600] echo "$(date +'%A %d %B')"
    color = rgba(cdd6f4ee)
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}

# Message de bienvenue
label {
    monitor =
    text = Bienvenue $USER
    color = rgba(cdd6f4ee)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# Champ de mot de passe
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(cba6f7ee)
    inner_color = rgba(1e1e2eaa)
    font_color = rgba(cdd6f4ee)
    fade_on_empty = false
    placeholder_text = <i>Mot de passe...</i>
    hide_input = false
    position = 0, -150
    halign = center
    valign = center
}

# Indicateur de verrouillage (petit texte en bas)
label {
    monitor =
    text = Verrouillé
    color = rgba(6c7086ee)
    font_size = 12
    position = 20, -20
    halign = left
    valign = bottom
}
