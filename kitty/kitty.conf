# ==================== KITTY CONFIG ====================
# Thème: Catppuccin Mocha
# Transparence: 80%
# Ligatures: Oui
# Curseur: beam avec trail
# Bip: Visuel uniquement
# Confirmation: Zéro

## Apparence générale
font_family      JetBrainsMono Nerd Font
font_size        12
bold_font        auto
italic_font      auto
bold_italic_font auto

## Thème Catppuccin Mocha
background           #1e1e2e
foreground           #cdd6f4
selection_background #585b70
selection_foreground #cdd6f4

## Couleurs Catppuccin Mocha (16 couleurs)
# black
color0 #45475a
color8 #585b70

# red
color1 #f38ba8
color9 #f38ba8

# green
color2  #a6e3a1
color10 #a6e3a1

# yellow
color3  #f9e2af
color11 #f9e2af

# blue
color4  #89b4fa
color12 #89b4fa

# magenta
color5  #cba6f7
color13 #cba6f7

# cyan
color6  #94e2d5
color14 #94e2d5

# white
color7  #bac2de
color15 #a6adc8

## Transparence (80%)
background_opacity 0.8
dynamic_background_opacity yes
background_blur 8

## Ligatures
font_features JetBrainsMono-Nerd-Font +liga +dlig
disable_ligations never

## Curseur beam avec trail
cursor_shape beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Trail du curseur (nombre de traces)
cursor_trail 3

## Bip visuel uniquement (pas de bip sonore)
visual_bell_duration 0.3
enable_audio_bell no
bell_on_tab yes
visual_bell_color #cba6f7
window_alert_on_bell yes

## Zéro confirmation
confirm_os_window_close 0
shell_integration enabled

## Raccourcis clavier
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+f toggle_fullscreen
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+enter new_window
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

## Comportement général
scrollback_lines 10000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0
mouse_hide_wait 2.0
url_color #89b4fa
url_style curly
open_url_with default
copy_on_select yes
strip_trailing_spaces never

## Performance
sync_to_monitor yes
refresh_rate 0
input_delay 2

# Shell par défaut
shell /usr/bin/fish

