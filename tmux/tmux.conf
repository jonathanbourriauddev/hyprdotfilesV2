# Configuration tmux façon Typecraft

# Prefix: Ctrl+a (plus pratique que Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Recharger la config avec Prefix+r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config rechargée!"

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation entre panes avec Alt + flèches
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes avec Prefix + flèches
bind -r C-Left resize-pane -L 2
bind -r C-Right resize-pane -R 2
bind -r C-Up resize-pane -U 2
bind -r C-Down resize-pane -D 2

# Thème Catppuccin
set -g @catppuccin_flavour 'mocha'
set -g @plugin 'catppuccin/tmux'

# Status bar façon Typecraft
set -g status-position top
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g status-left '#[fg=#cba6f7,bg=#313244]  #S #[fg=#313244,bg=#1e1e2e]'
set -g status-right '#[fg=#1e1e2e,bg=#313244]#[fg=#cba6f7,bg=#313244] %H:%M #[fg=#89b4fa,bg=#313244] %d-%m-%Y '

# Fenêtres avec séparateurs
set -g window-status-format '#[fg=#1e1e2e,bg=#313244]#[fg=#cdd6f4,bg=#313244] #I:#W #[fg=#313244,bg=#1e1e2e]'
set -g window-status-current-format '#[fg=#1e1e2e,bg=#cba6f7]#[fg=#1e1e2e,bg=#cba6f7] #I:#W #[fg=#cba6f7,bg=#1e1e2e]'
set -g window-status-separator ''

# Souris
set -g mouse on

# Historique
set -g history-limit 10000

# Couleurs des bordures de pane
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# Initialiser TPM
run '~/.config/tmux/plugins/tpm/tpm'
